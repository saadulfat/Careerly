<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8"/>
    <link crossorigin="" href="https://fonts.gstatic.com/" rel="preconnect"/>
    <link as="style" href="https://fonts.googleapis.com/css2?display=swap&amp;family=Inter:wght@400;500;700;900" onload="this.rel='stylesheet'" rel="stylesheet"/>
    <title>Login - Careerly</title>
    <link href="data:image/x-icon;base64," rel="icon" type="image/x-icon"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <style type="text/tailwindcss">
        :root {
            --primary-color: #6366f1;
            --secondary-color: #4f46e5;
            --background-color: #f8fafc;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --accent-color: #ec4899;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background-color);
            color: var(--text-primary);
        }
    </style>
</head>
<body>
    <div class="min-h-screen bg-[var(--background-color)] flex items-center justify-center py-8 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-6">
            <!-- Header -->
            <div class="text-center">
                <div class="flex justify-center items-center gap-3 mb-4">
                    <svg class="h-8 w-8 text-[var(--primary-color)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M20 12h-4" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M8 12H4" stroke-linecap="round" stroke-linejoin="round"></path>
                        <path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-4v12h4a2 2 0 0 0 0-2Z"></path>
                        <path d="M4 20a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4v12H4a2 2 0 0 1 0-2Z"></path>
                    </svg>
                    <h2 class="text-2xl font-bold text-[var(--text-primary)]">Careerly</h2>
                </div>
                <h1 class="text-2xl font-bold text-[var(--text-primary)] mb-2">Welcome Back</h1>
                <p class="text-sm text-[var(--text-secondary)]">Sign in to your account to continue</p>
            </div>

            <!-- Login Form -->
            <div class="bg-white rounded-lg shadow-md border border-slate-200 p-6 mt-6">
                <form id="loginForm" class="space-y-4">
                    <!-- Error Message -->
                    <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-700 px-3 py-2 rounded-md text-sm"></div>
                    
                    <!-- Success Message -->
                    <div id="successMessage" class="hidden bg-green-50 border border-green-200 text-green-700 px-3 py-2 rounded-md text-sm"></div>

                    <!-- Email/Username Field -->
                    <div>
                        <label for="login" class="block text-sm font-medium text-[var(--text-primary)] mb-1">Email or Username</label>
                        <input type="text" id="login" name="login" required 
                               class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primary-color)] focus:border-transparent transition-colors"
                               placeholder="Enter your email or username">
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-[var(--text-primary)] mb-1">Password</label>
                        <input type="password" id="password" name="password" required 
                               class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-[var(--primary-color)] focus:border-transparent transition-colors"
                               placeholder="Enter your password">
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember" name="remember" type="checkbox" 
                                   class="h-4 w-4 text-[var(--primary-color)] focus:ring-[var(--primary-color)] border-slate-300 rounded">
                            <label for="remember" class="ml-2 text-sm text-[var(--text-secondary)]">Remember me</label>
                        </div>
                        <a href="#" class="text-sm text-[var(--primary-color)] hover:text-[var(--secondary-color)] transition-colors">
                            Forgot password?
                        </a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="loginBtn"
                            class="w-full bg-[var(--primary-color)] text-white py-2 px-4 rounded-md text-sm font-medium hover:bg-[var(--secondary-color)] focus:outline-none focus:ring-2 focus:ring-[var(--primary-color)] focus:ring-offset-2 transition-colors duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                        <span id="loginBtnText">Sign In</span>
                        <span id="loginBtnLoading" class="hidden">Signing in...</span>
                    </button>
                </form>

                <!-- Signup Link -->
                <div class="mt-4 text-center">
                    <p class="text-sm text-[var(--text-secondary)]">
                        Don't have an account? 
                        <a href="/signup" class="text-[var(--primary-color)] hover:text-[var(--secondary-color)] font-medium transition-colors">
                            Sign up here
                        </a>
                    </p>
                </div>

                <!-- Back to Home -->
                <div class="mt-3 text-center">
                    <a href="/" class="text-sm text-[var(--text-secondary)] hover:text-[var(--text-primary)] transition-colors">
                        ← Back to Home
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const loginBtnLoading = document.getElementById('loginBtnLoading');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Hide previous messages
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtnText.classList.add('hidden');
            loginBtnLoading.classList.remove('hidden');
            
            try {
                const formData = new FormData(this);
                const response = await fetch('/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        login: formData.get('login'),
                        password: formData.get('password'),
                        remember: formData.get('remember') === 'on'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successMessage.textContent = data.message || 'Login successful! Redirecting...';
                    successMessage.classList.remove('hidden');
                    
                    // Redirect after short delay
                    setTimeout(() => {
                        window.location.href = data.redirect_url || '/';
                    }, 1000);
                } else {
                    errorMessage.textContent = data.message || 'Login failed. Please try again.';
                    errorMessage.classList.remove('hidden');
                }
            } catch (error) {
                errorMessage.textContent = 'Network error. Please check your connection and try again.';
                errorMessage.classList.remove('hidden');
            } finally {
                // Reset button state
                loginBtn.disabled = false;
                loginBtnText.classList.remove('hidden');
                loginBtnLoading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
